name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ksp-share-linux-x64
            bin: ksp-share
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ksp-share-macos-x64
            bin: ksp-share
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ksp-share-macos-arm64
            bin: ksp-share
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ksp-share-windows-x64.exe
            bin: ksp-share.exe
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.artifact }}"
      - name: Compute SHA-256
        shell: bash
        run: |
          cd dist
          if command -v sha256sum >/dev/null; then
            sha256sum "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          else
            shasum -a 256 "${{ matrix.artifact }}" > "${{ matrix.artifact }}.sha256"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}*

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist -type f \( -name 'ksp-share-*' -o -name '*.sha256' \) -exec cp {} release/ \;
          ls -la release
      - uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
          fail_on_unmatched_files: true
